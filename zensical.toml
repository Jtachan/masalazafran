[project]
site_name = "Masala & Azafran"
site_description = "International recipes from an indo-hispanic kitchen."
site_author = "Jtachan"
docs_dir = "recipes"

extra_javascript = [
    "https://unpkg.com/tablesort@5.3.0/dist/tablesort.min.js",
    "tablesort.js"
]

nav = [
  {"Home" = "index.md"},
  {"Dough" = [
    "dough/index.md",
    "dough/corn_tortillas.md",
    "dough/focaccia.md",
    "dough/fresh_pasta.md",
    "dough/gnocchi.md",
    "dough/green_pasta.md",
    "dough/gyoza_wrapper.md",
    "dough/knedliky.md",
    "dough/liquid_roti.md",
    "dough/pizza_dough.md",
    "dough/sourdough.md",
  ]},
  {"Preserves" = [
    "preserves/index.md",
    "preserves/kiwi_confiture.md",
  ]},
  {"Sauces" = [
    "sauce/index.md",
    "sauce/guacamole.md",
    "sauce/tzatziki.md",
  ]},
  {"Sides" = [
    "sides/index.md",
    "sides/frijoles_paste.md",
    "sides/migas.md",
    "sides/potato_au_gratin.md",
    "sides/quiche.md",
  ]},
  {"Stews" = [
    "stew/index.md",
    "stew/goulash.md",
  ]},
  {"Sweets" = [
    "sweets/index.md",
    "sweets/applecake.md",
    "sweets/cheesecake.md",
    "sweets/flan.md",
    "sweets/tiramisu.md",
  ]},
]

[project.markdown_extensions.pymdownx.details]
[project.markdown_extensions.tables]
[project.markdown_extensions.attr_list]
[project.markdown_extensions.pymdownx.emoji]
[project.markdown_extensions.admonition]
[project.markdown_extensions.pymdownx.superfences]
[project.markdown_extensions.def_list]

[project.theme]

icon = {logo = "lucide/cooking-pot"}
language = "en"

features = [
    "content.footnote.tooltips",
    "content.tabs.link",
    "content.tooltips",
    "header.autohide",
    "navigation.expand",
    "navigation.indexes",
    "navigation.instant",
    "navigation.instant.prefetch",
    "navigation.path",
    "navigation.prune",
    "navigation.sections",
    "navigation.tabs",
    "navigation.tabs.sticky",
    "navigation.top",
    "navigation.tracking",
    "search.highlight",
    "toc.follow",
    "toc.follow",
    "toc.integrate",
]

palette = [
    { scheme = "default", toggle = { icon = "lucide/sun", name = "Switch to dark mode" } },
    { scheme = "slate", toggle = { icon = "lucide/moon", name = "Switch to light mode" } },
]
