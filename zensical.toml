[project]
site_name = "Masala-Azafran"
site_description = "International recipes from an indo-hispanic kitchen."
site_author = "Jtachan"
site_url = "https://www.masalazafran.com/"
docs_dir = "recipes"

[project.extra.tags]
Vegetarian = "vegetarian"
Baked = "baked"
Fermented = "fermented"
Side-dish = "side-dish"
Mexican = "mexican"
Beans = "beans"
Bread = "bread"

[project.theme]
language = "en"
features = [
    "content.footnote.tooltips",
    "content.tabs.link",
    "content.tooltips",
    "header.autohide",
    "navigation.expand",
    "navigation.footer",
    "navigation.indexes",
    "navigation.instant",
    "navigation.instant.prefetch",
    "navigation.path",
    "navigation.prune",
    "navigation.sections",
    "navigation.tabs",
    "navigation.tabs.sticky",
    "navigation.top",
    "navigation.tracking",
    "search.highlight",
    "toc.follow",
    "toc.integrate",
]
palette = [
    { scheme = "default", toggle = { icon = "lucide/sun", name = "Switch to dark mode" } },
    { scheme = "slate", toggle = { icon = "lucide/moon", name = "Switch to light mode" } },
]
